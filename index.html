<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>転職助けるくん</title>

<!-- ホーム画面追加（PWA）対応 -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1A1D1B" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="転職助けるくん" />
<link rel="apple-touch-icon" href="icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; background: #FFFFFF; }
  #root { min-height: 100vh; }
</style>
<script>
  window.addEventListener('error', function (e) {
    var root = document.getElementById('root');
    if (root && !root.hasChildNodes()) {
      root.innerHTML = '<pre style="color:#B33A2E;padding:20px;white-space:pre-wrap;font-size:12px;">読み込みエラー:\n' + (e.message || e) + '</pre>';
    }
  });
</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

/* ---------- 簡易アイコン（依存なしの手書きSVG） ---------- */
const Icon = ({ children, size = 16, strokeWidth = 2 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">{children}</svg>
);
const Calendar = (p) => <Icon {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></Icon>;
const Building2 = (p) => <Icon {...p}><rect x="4" y="3" width="16" height="18"/><line x1="9" y1="7" x2="9" y2="7.01"/><line x1="15" y1="7" x2="15" y2="7.01"/><line x1="9" y1="12" x2="9" y2="12.01"/><line x1="15" y1="12" x2="15" y2="12.01"/><line x1="9" y1="17" x2="15" y2="17"/></Icon>;
const ChevronRight = (p) => <Icon {...p}><polyline points="9 6 15 12 9 18"/></Icon>;
const ChevronLeft = (p) => <Icon {...p}><polyline points="15 6 9 12 15 18"/></Icon>;
const X = (p) => <Icon {...p}><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></Icon>;
const Plus = (p) => <Icon {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Icon>;
const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></Icon>;
const MapPin = (p) => <Icon {...p}><path d="M12 21s7-6.5 7-11.5A7 7 0 0 0 5 9.5C5 14.5 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.3"/></Icon>;
const Trash2 = (p) => <Icon {...p}><polyline points="3 6 5 6 21 6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></Icon>;
const ListChecks = (p) => <Icon {...p}><polyline points="3 6 4.5 7.5 7.5 4.5"/><polyline points="3 13 4.5 14.5 7.5 11.5"/><line x1="11" y1="6" x2="21" y2="6"/><line x1="11" y1="13" x2="21" y2="13"/><line x1="11" y1="20" x2="21" y2="20"/></Icon>;
const ArrowUpDown = (p) => <Icon {...p}><polyline points="7 15 3 19 3 5"/><polyline points="17 9 21 5 21 19"/></Icon>;
const ClipboardCheck = (p) => <Icon {...p}><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1H9V4z"/><polyline points="9 13 11 15 15 10.5"/></Icon>;
const Square = (p) => <Icon {...p}><rect x="4" y="4" width="16" height="16" rx="3"/></Icon>;
const CheckSquare = (p) => <Icon {...p}><rect x="4" y="4" width="16" height="16" rx="3"/><polyline points="8 12 11 15 16 9"/></Icon>;

/* ---------- ここから本体ロジック ---------- */
const STAGES = [
  { key: 'entry', label: '書類選考', short: '書類' },
  { key: 'first', label: '一次面接', short: '一次' },
  { key: 'second', label: '二次面接', short: '二次' },
  { key: 'final', label: '最終面接', short: '最終' },
  { key: 'offer', label: '内定', short: '内定' },
];
const REJECTED = 'rejected';
const SIZES = ['大手', '中小', 'ベンチャー'];
const STORAGE_KEY = 'job-hunt-command-v1';

const STAGE_COLOR = {
  entry: '#1E3A5F', first: '#1E3A5F', second: '#1E3A5F', final: '#1E3A5F',
  offer: '#A67C27', rejected: '#B33A2E',
};

function stageIndex(status) {
  if (status === REJECTED) return -1;
  return STAGES.findIndex(s => s.key === status);
}
function stampLabel(status) {
  if (status === REJECTED) return '否';
  if (status === 'offer') return '内定';
  const idx = stageIndex(status);
  return STAGES[idx]?.short || '';
}

function loadCompanies() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // 既存データ互換: submissionsフィールドが無ければ空配列を補う
      return parsed.map(c => ({ submissions: [], ...c, submissions: c.submissions || [] }));
    }
  } catch (e) {}
  return [{
    id: 'c1', name: '株式会社サンプル商事', industry: '総合商社', jobType: '経営企画',
    companySize: '大手', salary: 550, description: '', jobDescription: '', status: 'first',
    motivation: '', submissions: [], events: [{ id: 'e1', title: '一次面接', date: '2026-07-15', time: '14:00', place: 'オンライン(Zoom)' }],
  }];
}

function StageTrack({ status }) {
  const idx = stageIndex(status);
  const isRejected = status === REJECTED;
  return (
    <div className="stage-track">
      {STAGES.map((s, i) => {
        const done = !isRejected && i <= idx;
        const isCurrent = !isRejected && i === idx;
        return (
          <React.Fragment key={s.key}>
            <div className={`stage-node ${done ? 'done' : ''} ${isCurrent ? 'current' : ''}`}>
              <span className="stage-dot" />
              <span className="stage-label">{s.short}</span>
            </div>
            {i < STAGES.length - 1 && <div className={`stage-line ${!isRejected && i < idx ? 'done' : ''}`} />}
          </React.Fragment>
        );
      })}
      {isRejected && <span className="rejected-tag">不採用</span>}
    </div>
  );
}

function CompanyCard({ company, onOpen, index }) {
  const nextEvent = company.events
    .slice()
    .sort((a, b) => new Date(a.date + 'T' + (a.time || '00:00')) - new Date(b.date + 'T' + (b.time || '00:00')))
    .find(e => new Date(e.date) >= new Date(new Date().toDateString()));
  const color = STAGE_COLOR[company.status];
  return (
    <div className="company-card" onClick={() => onOpen(company.id)}>
      <div className="card-file-tab">FILE No.{String(index + 1).padStart(3, '0')}</div>
      <div className="card-main">
        <div className="card-body">
          <h3 className="card-name">{company.name}</h3>
          <p className="card-industry">{company.industry || '業種未設定'}</p>
          <div className="card-chip-row">
            {company.jobType && <span className="info-chip">{company.jobType}</span>}
            {company.companySize && <span className="info-chip">{company.companySize}</span>}
            {!!company.salary && <span className="info-chip salary">年収 {company.salary}万円</span>}
          </div>
          <StageTrack status={company.status} />
          {nextEvent && (
            <div className="card-next-event">
              <Clock size={12} strokeWidth={2} />
              <span>{nextEvent.date} {nextEvent.time} — {nextEvent.title}</span>
            </div>
          )}
        </div>
        <div className="stamp" style={{ color, borderColor: color }}>
          <span className="stamp-text">{stampLabel(company.status)}</span>
        </div>
      </div>
    </div>
  );
}

function CompanyDetail({ company, onClose, onUpdate, onDelete }) {
  const [local, setLocal] = useState(company);
  const [newEvent, setNewEvent] = useState({ title: '', date: '', time: '', place: '' });
  const [newSubmission, setNewSubmission] = useState({ title: '', dueDate: '' });
  const [tab, setTab] = useState('info');

  const save = (patch) => {
    const updated = { ...local, ...patch };
    setLocal(updated);
    onUpdate(updated);
  };
  const addEvent = () => {
    if (!newEvent.title || !newEvent.date) return;
    const ev = { ...newEvent, id: 'e' + Date.now() };
    save({ events: [...local.events, ev] });
    setNewEvent({ title: '', date: '', time: '', place: '' });
  };
  const removeEvent = (id) => save({ events: local.events.filter(e => e.id !== id) });

  const submissions = local.submissions || [];
  const addSubmission = () => {
    if (!newSubmission.title.trim()) return;
    const item = { id: 's' + Date.now(), title: newSubmission.title.trim(), dueDate: newSubmission.dueDate, done: false };
    save({ submissions: [...submissions, item] });
    setNewSubmission({ title: '', dueDate: '' });
  };
  const toggleSubmission = (id) => save({ submissions: submissions.map(s => s.id === id ? { ...s, done: !s.done } : s) });
  const removeSubmission = (id) => save({ submissions: submissions.filter(s => s.id !== id) });

  return (
    <div className="detail-overlay" onClick={onClose}>
      <div className="detail-panel" onClick={e => e.stopPropagation()}>
        <div className="detail-header">
          <div style={{ flex: 1 }}>
            <div className="card-file-tab">FILE No.{local.id.replace(/\D/g, '').slice(-3).padStart(3, '0')}</div>
            <input className="detail-name-input" value={local.name} onChange={e => save({ name: e.target.value })} placeholder="企業名" />
            <input className="detail-industry-input" value={local.industry} onChange={e => save({ industry: e.target.value })} placeholder="業種" />
          </div>
          <button className="icon-btn" onClick={onClose}><X size={20} /></button>
        </div>

        <div className="detail-stage-section">
          <StageTrack status={local.status} />
          <div className="stage-selector">
            {STAGES.map(s => (
              <button key={s.key} className={`stage-btn ${local.status === s.key ? 'active' : ''}`} onClick={() => save({ status: s.key })}>{s.short}</button>
            ))}
            <button className={`stage-btn reject ${local.status === REJECTED ? 'active' : ''}`} onClick={() => save({ status: REJECTED })}>不採用</button>
          </div>
        </div>

        <div className="detail-tabs">
          <button className={`tab-btn ${tab === 'info' ? 'active' : ''}`} onClick={() => setTab('info')}><Building2 size={14} /> 企業情報</button>
          <button className={`tab-btn ${tab === 'motivation' ? 'active' : ''}`} onClick={() => setTab('motivation')}>志望動機</button>
          <button className={`tab-btn ${tab === 'schedule' ? 'active' : ''}`} onClick={() => setTab('schedule')}><Calendar size={14} /> 予定</button>
          <button className={`tab-btn ${tab === 'submissions' ? 'active' : ''}`} onClick={() => setTab('submissions')}><ClipboardCheck size={14} /> 提出物</button>
        </div>

        {tab === 'info' && (
          <div className="tab-content">
            <div className="info-grid">
              <label className="info-field">
                <span>職種</span>
                <input value={local.jobType || ''} onChange={e => save({ jobType: e.target.value })} placeholder="例）経営企画" />
              </label>
              <label className="info-field">
                <span>企業規模</span>
                <div className="size-select-row">
                  {SIZES.map(s => (
                    <button key={s} className={`size-btn ${local.companySize === s ? 'active' : ''}`} onClick={() => save({ companySize: s })}>{s}</button>
                  ))}
                </div>
              </label>
              <label className="info-field">
                <span>想定年収（万円）</span>
                <input type="number" value={local.salary || ''} onChange={e => save({ salary: e.target.value === '' ? '' : Number(e.target.value) })} placeholder="例）500" />
              </label>
            </div>
            <label className="info-field block">
              <span>企業説明</span>
              <textarea className="info-textarea" value={local.description || ''} onChange={e => save({ description: e.target.value })} placeholder="事業内容、社風、規模感などをメモ" />
            </label>
            <label className="info-field block">
              <span>職務内容</span>
              <textarea className="info-textarea" value={local.jobDescription || ''} onChange={e => save({ jobDescription: e.target.value })} placeholder="募集ポジションの業務内容、求められるスキルなど" />
            </label>
          </div>
        )}

        {tab === 'motivation' && (
          <div className="tab-content">
            <textarea className="motivation-textarea" value={local.motivation} onChange={e => save({ motivation: e.target.value })}
              placeholder={"この企業への志望動機・アピールしたいポイントをここに書く。\n\n例）\n・なぜこの会社か\n・自分の強みとどう繋がるか\n・入社後どう貢献するか"} />
          </div>
        )}

        {tab === 'schedule' && (
          <div className="tab-content">
            <div className="event-list">
              {local.events.length === 0 && <p className="empty-note">予定はまだ登録されていない。</p>}
              {local.events.slice().sort((a, b) => new Date(a.date) - new Date(b.date)).map(ev => (
                <div key={ev.id} className="event-row">
                  <div className="event-date-badge">
                    <span className="event-date-day">{ev.date?.split('-')[2]}</span>
                    <span className="event-date-month">{ev.date?.split('-')[1]}月</span>
                  </div>
                  <div className="event-info">
                    <div className="event-title">{ev.title}</div>
                    <div className="event-meta">
                      {ev.time && <span><Clock size={11} /> {ev.time}</span>}
                      {ev.place && <span><MapPin size={11} /> {ev.place}</span>}
                    </div>
                  </div>
                  <button className="icon-btn small" onClick={() => removeEvent(ev.id)}><Trash2 size={14} /></button>
                </div>
              ))}
            </div>
            <div className="event-add-form">
              <input placeholder="予定名（例：一次面接）" value={newEvent.title} onChange={e => setNewEvent({ ...newEvent, title: e.target.value })} />
              <div className="event-add-row">
                <input type="date" value={newEvent.date} onChange={e => setNewEvent({ ...newEvent, date: e.target.value })} />
                <input type="time" value={newEvent.time} onChange={e => setNewEvent({ ...newEvent, time: e.target.value })} />
              </div>
              <input placeholder="場所（例：オンライン / 本社3F）" value={newEvent.place} onChange={e => setNewEvent({ ...newEvent, place: e.target.value })} />
              <button className="add-event-btn" onClick={addEvent}><Plus size={14} /> 予定を追加</button>
            </div>
          </div>
        )}

        {tab === 'submissions' && (
          <div className="tab-content">
            <div className="submission-list">
              {submissions.length === 0 && <p className="empty-note">提出物はまだ登録されていない。</p>}
              {submissions
                .slice()
                .sort((a, b) => (a.done - b.done) || new Date(a.dueDate || '9999-12-31') - new Date(b.dueDate || '9999-12-31'))
                .map(s => (
                  <div key={s.id} className={`submission-row ${s.done ? 'done' : ''}`}>
                    <button className="submission-check" onClick={() => toggleSubmission(s.id)}>
                      {s.done ? <CheckSquare size={18} /> : <Square size={18} />}
                    </button>
                    <div className="submission-info">
                      <div className="submission-title">{s.title}</div>
                      {s.dueDate && <div className="submission-due">期限 {s.dueDate}</div>}
                    </div>
                    <button className="icon-btn small" onClick={() => removeSubmission(s.id)}><Trash2 size={14} /></button>
                  </div>
                ))}
            </div>
            <div className="event-add-form">
              <input placeholder="提出物名（例：履歴書）" value={newSubmission.title} onChange={e => setNewSubmission({ ...newSubmission, title: e.target.value })} />
              <input type="date" value={newSubmission.dueDate} onChange={e => setNewSubmission({ ...newSubmission, dueDate: e.target.value })} />
              <button className="add-event-btn" onClick={addSubmission}><Plus size={14} /> 提出物を追加</button>
            </div>
          </div>
        )}

        <button className="delete-company-btn" onClick={() => { onDelete(local.id); onClose(); }}><Trash2 size={13} /> この企業を削除する</button>
      </div>
    </div>
  );
}

function DayDetail({ dateStr, events, onClose, onOpenCompany }) {
  const [y, m, d] = dateStr.split('-');
  const sorted = events.slice().sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  return (
    <div className="detail-overlay" onClick={onClose}>
      <div className="detail-panel day-detail-panel" onClick={e => e.stopPropagation()}>
        <div className="detail-header">
          <div>
            <div className="header-eyebrow">{y}年{Number(m)}月{Number(d)}日</div>
            <h2 className="header-title" style={{ fontSize: 20 }}>この日の予定</h2>
          </div>
          <button className="icon-btn" onClick={onClose}><X size={20} /></button>
        </div>
        <div className="event-list">
          {sorted.length === 0 && <p className="empty-note">この日の予定はなし。</p>}
          {sorted.map(ev => (
            <div
              key={ev.id}
              className="event-row day-event-row"
              onClick={() => { if (onOpenCompany && ev.companyId) { onOpenCompany(ev.companyId); onClose(); } }}
            >
              <div className="event-date-badge" style={{ borderColor: STAGE_COLOR[ev.status], background: 'transparent' }}>
                <span className="event-date-day" style={{ color: STAGE_COLOR[ev.status] }}>{ev.time || '終日'}</span>
              </div>
              <div className="event-info">
                <div className="event-title">{ev.title}</div>
                <div className="event-meta">
                  <span className="info-chip">{ev.company}</span>
                  {ev.place && <span><MapPin size={11} /> {ev.place}</span>}
                </div>
              </div>
              <ChevronRight size={16} />
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function CalendarView({ companies, onOpenCompany }) {
  const [cursor, setCursor] = useState(new Date());
  const [selectedDate, setSelectedDate] = useState(null);
  const year = cursor.getFullYear();
  const month = cursor.getMonth();

  const allEvents = useMemo(() => {
    const map = {};
    companies.forEach(c => {
      c.events.forEach(e => {
        if (!map[e.date]) map[e.date] = [];
        map[e.date].push({ ...e, company: c.name, status: c.status, companyId: c.id });
      });
    });
    return map;
  }, [companies]);

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const pad = (n) => String(n).padStart(2, '0');
  const todayStr = new Date().toISOString().split('T')[0];
  const MAX_VISIBLE = 2;

  return (
    <div className="calendar-view">
      <div className="calendar-header">
        <button className="icon-btn" onClick={() => setCursor(new Date(year, month - 1, 1))}><ChevronLeft size={18} /></button>
        <h2>{year}年 {month + 1}月</h2>
        <button className="icon-btn" onClick={() => setCursor(new Date(year, month + 1, 1))}><ChevronRight size={18} /></button>
      </div>
      <div className="calendar-grid">
        {['日', '月', '火', '水', '木', '金', '土'].map(d => <div key={d} className="calendar-weekday">{d}</div>)}
        {cells.map((d, i) => {
          if (d === null) return <div key={i} className="calendar-cell empty" />;
          const dateStr = `${year}-${pad(month + 1)}-${pad(d)}`;
          const dayEvents = allEvents[dateStr] || [];
          const isToday = dateStr === todayStr;
          const hasEvents = dayEvents.length > 0;
          return (
            <div
              key={i}
              className={`calendar-cell ${isToday ? 'today' : ''} ${hasEvents ? 'clickable' : ''}`}
              onClick={() => hasEvents && setSelectedDate(dateStr)}
            >
              <span className="cell-day-num">{d}</span>
              {dayEvents.slice(0, MAX_VISIBLE).map(ev => (
                <div key={ev.id} className="cell-event" style={{ borderLeftColor: STAGE_COLOR[ev.status] }}>
                  <span className="cell-event-company">{ev.company}</span>
                  <span className="cell-event-title">{ev.title}</span>
                </div>
              ))}
              {dayEvents.length > MAX_VISIBLE && (
                <div className="cell-event-more">+{dayEvents.length - MAX_VISIBLE}件</div>
              )}
            </div>
          );
        })}
      </div>

      {selectedDate && (
        <DayDetail
          dateStr={selectedDate}
          events={allEvents[selectedDate] || []}
          onClose={() => setSelectedDate(null)}
          onOpenCompany={onOpenCompany}
        />
      )}
    </div>
  );
}

function StatusBoard({ companies, onOpen }) {
  const columns = [...STAGES, { key: REJECTED, label: '不採用', short: '不採用' }];
  return (
    <div className="status-board">
      {columns.map(col => {
        const items = companies.filter(c => c.status === col.key);
        return (
          <div key={col.key} className="status-column">
            <div className="status-column-header" style={{ borderColor: STAGE_COLOR[col.key] }}>
              <span style={{ color: STAGE_COLOR[col.key] }}>{col.label}</span>
              <span className="status-column-count">{items.length}</span>
            </div>
            <div className="status-column-body">
              {items.length === 0 && <p className="empty-note small">なし</p>}
              {items.map(c => (
                <div key={c.id} className="status-mini-card" onClick={() => onOpen(c.id)}>
                  <div className="status-mini-name">{c.name}</div>
                  <div className="status-mini-meta">
                    {c.jobType && <span>{c.jobType}</span>}
                    {!!c.salary && <span>{c.salary}万円</span>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function SubmissionsOverview({ companies, onUpdate }) {
  const [quickForm, setQuickForm] = useState({ companyId: '', title: '', dueDate: '' });

  const allItems = useMemo(() => {
    const items = [];
    companies.forEach(c => {
      (c.submissions || []).forEach(s => items.push({ ...s, companyId: c.id, companyName: c.name }));
    });
    return items;
  }, [companies]);

  const pending = allItems.filter(s => !s.done).sort((a, b) => new Date(a.dueDate || '9999-12-31') - new Date(b.dueDate || '9999-12-31'));
  const done = allItems.filter(s => s.done);

  const toggle = (companyId, id) => {
    const c = companies.find(c => c.id === companyId);
    if (!c) return;
    onUpdate({ ...c, submissions: (c.submissions || []).map(s => s.id === id ? { ...s, done: !s.done } : s) });
  };
  const remove = (companyId, id) => {
    const c = companies.find(c => c.id === companyId);
    if (!c) return;
    onUpdate({ ...c, submissions: (c.submissions || []).filter(s => s.id !== id) });
  };
  const addQuick = () => {
    if (!quickForm.companyId || !quickForm.title.trim()) return;
    const c = companies.find(c => c.id === quickForm.companyId);
    if (!c) return;
    const item = { id: 's' + Date.now(), title: quickForm.title.trim(), dueDate: quickForm.dueDate, done: false };
    onUpdate({ ...c, submissions: [...(c.submissions || []), item] });
    setQuickForm({ companyId: quickForm.companyId, title: '', dueDate: '' });
  };

  const isOverdue = (dueDate) => dueDate && new Date(dueDate) < new Date(new Date().toDateString());

  return (
    <div>
      <div className="stats-strip" style={{ gridTemplateColumns: 'repeat(2, 1fr)', marginBottom: 16 }}>
        <div className="stat-box"><span className="stat-num" style={{ color: '#1E3A5F' }}>{pending.length}</span><span className="stat-label">未提出</span></div>
        <div className="stat-box"><span className="stat-num" style={{ color: '#A67C27' }}>{done.length}</span><span className="stat-label">提出済み</span></div>
      </div>

      <div className="add-form" style={{ marginBottom: 18 }}>
        <select value={quickForm.companyId} onChange={e => setQuickForm({ ...quickForm, companyId: e.target.value })}>
          <option value="">企業を選択</option>
          {companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input placeholder="提出物名（例：履歴書）" value={quickForm.title} onChange={e => setQuickForm({ ...quickForm, title: e.target.value })} />
        <input type="date" value={quickForm.dueDate} onChange={e => setQuickForm({ ...quickForm, dueDate: e.target.value })} />
        <div className="add-form-actions">
          <button className="confirm" onClick={addQuick}><Plus size={13} style={{ marginRight: 4, verticalAlign: 'middle' }} />提出物を追加</button>
        </div>
      </div>

      <div className="group-header">未提出<span>{pending.length}件</span></div>
      {pending.length === 0 && <p className="empty-note">未提出の項目はなし。</p>}
      <div className="submission-list" style={{ marginBottom: 20 }}>
        {pending.map(s => (
          <div key={s.id} className="submission-row">
            <button className="submission-check" onClick={() => toggle(s.companyId, s.id)}><Square size={18} /></button>
            <div className="submission-info">
              <div className="submission-title">{s.title}</div>
              <div className="submission-meta-row">
                <span className="info-chip">{s.companyName}</span>
                {s.dueDate && <span className={`submission-due ${isOverdue(s.dueDate) ? 'overdue' : ''}`}>期限 {s.dueDate}</span>}
              </div>
            </div>
            <button className="icon-btn small" onClick={() => remove(s.companyId, s.id)}><Trash2 size={14} /></button>
          </div>
        ))}
      </div>

      {done.length > 0 && (
        <React.Fragment>
          <div className="group-header">提出済み<span>{done.length}件</span></div>
          <div className="submission-list">
            {done.map(s => (
              <div key={s.id} className="submission-row done">
                <button className="submission-check" onClick={() => toggle(s.companyId, s.id)}><CheckSquare size={18} /></button>
                <div className="submission-info">
                  <div className="submission-title">{s.title}</div>
                  <div className="submission-meta-row">
                    <span className="info-chip">{s.companyName}</span>
                  </div>
                </div>
                <button className="icon-btn small" onClick={() => remove(s.companyId, s.id)}><Trash2 size={14} /></button>
              </div>
            ))}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}

const SORT_MODES = [
  { key: 'normal', label: '通常' },
  { key: 'salary', label: '年収順' },
  { key: 'jobType', label: '職種別' },
  { key: 'size', label: '規模別' },
];

function CompanyListView({ companies, onOpen, showAdd, setShowAdd, form, setForm, onAdd }) {
  const [sortMode, setSortMode] = useState('normal');

  const grouped = useMemo(() => {
    const withIndex = companies.map((c, i) => ({ c, i }));
    if (sortMode === 'normal') return [{ label: null, items: withIndex }];
    if (sortMode === 'salary') return [{ label: null, items: withIndex.slice().sort((a, b) => (b.c.salary || 0) - (a.c.salary || 0)) }];
    if (sortMode === 'jobType') {
      const groups = {};
      withIndex.forEach(item => { const key = item.c.jobType || '未分類'; (groups[key] = groups[key] || []).push(item); });
      return Object.keys(groups).sort().map(k => ({ label: k, items: groups[k] }));
    }
    if (sortMode === 'size') {
      const order = [...SIZES, '未分類'];
      const groups = {};
      withIndex.forEach(item => { const key = item.c.companySize || '未分類'; (groups[key] = groups[key] || []).push(item); });
      return order.filter(k => groups[k]).map(k => ({ label: k, items: groups[k] }));
    }
    return [{ label: null, items: withIndex }];
  }, [companies, sortMode]);

  return (
    <React.Fragment>
      {!showAdd && <button className="add-company-btn" onClick={() => setShowAdd(true)}><Plus size={15} /> 企業を登録する</button>}
      {showAdd && (
        <div className="add-form">
          <input placeholder="企業名" value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} autoFocus />
          <div className="add-form-row">
            <input placeholder="業種（任意）" value={form.industry} onChange={e => setForm({ ...form, industry: e.target.value })} />
            <input placeholder="職種（任意）" value={form.jobType} onChange={e => setForm({ ...form, jobType: e.target.value })} />
          </div>
          <div className="add-form-row">
            <select value={form.companySize} onChange={e => setForm({ ...form, companySize: e.target.value })}>
              <option value="">企業規模を選択</option>
              {SIZES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <input type="number" placeholder="想定年収（万円）" value={form.salary} onChange={e => setForm({ ...form, salary: e.target.value })} />
          </div>
          <div className="add-form-actions">
            <button className="confirm" onClick={onAdd}>登録</button>
            <button className="cancel" onClick={() => setShowAdd(false)}>キャンセル</button>
          </div>
        </div>
      )}

      {companies.length > 0 && (
        <div className="sort-bar">
          <ArrowUpDown size={13} />
          {SORT_MODES.map(m => (
            <button key={m.key} className={`sort-btn ${sortMode === m.key ? 'active' : ''}`} onClick={() => setSortMode(m.key)}>{m.label}</button>
          ))}
        </div>
      )}

      {companies.length === 0 ? (
        <div className="empty-state">まだ企業が登録されていない。<br />上のボタンから最初の1社を登録しよう。</div>
      ) : (
        <div className="company-list">
          {grouped.map((group, gi) => (
            <React.Fragment key={gi}>
              {group.label && <div className="group-header">{group.label}<span>{group.items.length}件</span></div>}
              {group.items.map(({ c, i }) => <CompanyCard key={c.id} company={c} onOpen={onOpen} index={i} />)}
            </React.Fragment>
          ))}
        </div>
      )}
    </React.Fragment>
  );
}

function JobHuntCommand() {
  const [companies, setCompanies] = useState(loadCompanies);
  const [view, setView] = useState('list');
  const [openId, setOpenId] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ name: '', industry: '', jobType: '', companySize: '', salary: '' });

  React.useEffect(() => {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(companies)); } catch (e) {}
  }, [companies]);

  const openCompany = companies.find(c => c.id === openId);

  const addCompany = () => {
    if (!form.name.trim()) return;
    const id = 'c' + Date.now();
    setCompanies([...companies, {
      id, name: form.name.trim(), industry: form.industry.trim(), jobType: form.jobType.trim(),
      companySize: form.companySize, salary: form.salary === '' ? '' : Number(form.salary),
      description: '', jobDescription: '', status: 'entry', motivation: '', submissions: [], events: [],
    }]);
    setForm({ name: '', industry: '', jobType: '', companySize: '', salary: '' });
    setShowAdd(false);
  };
  const updateCompany = (updated) => setCompanies(companies.map(c => c.id === updated.id ? updated : c));
  const deleteCompany = (id) => setCompanies(companies.filter(c => c.id !== id));

  const stats = useMemo(() => {
    const active = companies.filter(c => c.status !== REJECTED && c.status !== 'offer').length;
    const offers = companies.filter(c => c.status === 'offer').length;
    const rejected = companies.filter(c => c.status === REJECTED).length;
    return { total: companies.length, active, offers, rejected };
  }, [companies]);

  return (
    <div className="app-root">
      <div className="header-bar">
        <div>
          <div className="header-eyebrow">JOB HUNT COMMAND</div>
          <h1 className="header-title">転職助けるくん</h1>
        </div>
        <div className="header-seal">決裁</div>
      </div>

      <div className="stats-strip">
        <div className="stat-box"><span className="stat-num">{stats.total}</span><span className="stat-label">登録企業</span></div>
        <div className="stat-box"><span className="stat-num" style={{ color: '#1E3A5F' }}>{stats.active}</span><span className="stat-label">選考中</span></div>
        <div className="stat-box"><span className="stat-num" style={{ color: '#A67C27' }}>{stats.offers}</span><span className="stat-label">内定</span></div>
        <div className="stat-box"><span className="stat-num" style={{ color: '#B33A2E' }}>{stats.rejected}</span><span className="stat-label">不採用</span></div>
      </div>

      {view === 'list' && (
        <CompanyListView companies={companies} onOpen={setOpenId} showAdd={showAdd} setShowAdd={setShowAdd} form={form} setForm={setForm} onAdd={addCompany} />
      )}
      {view === 'calendar' && <CalendarView companies={companies} onOpenCompany={setOpenId} />}
      {view === 'status' && <StatusBoard companies={companies} onOpen={setOpenId} />}
      {view === 'submissions' && <SubmissionsOverview companies={companies} onUpdate={updateCompany} />}

      {openCompany && (
        <CompanyDetail company={openCompany} onClose={() => setOpenId(null)} onUpdate={updateCompany} onDelete={deleteCompany} />
      )}

      <div className="bottom-nav">
        <button className={`bottom-nav-btn ${view === 'list' ? 'active' : ''}`} onClick={() => setView('list')}>
          {view === 'list' && <span className="nav-indicator" />}<Building2 size={19} />企業一覧
        </button>
        <button className={`bottom-nav-btn ${view === 'calendar' ? 'active' : ''}`} onClick={() => setView('calendar')}>
          {view === 'calendar' && <span className="nav-indicator" />}<Calendar size={19} />カレンダー
        </button>
        <button className={`bottom-nav-btn ${view === 'status' ? 'active' : ''}`} onClick={() => setView('status')}>
          {view === 'status' && <span className="nav-indicator" />}<ListChecks size={19} />選考状況
        </button>
        <button className={`bottom-nav-btn ${view === 'submissions' ? 'active' : ''}`} onClick={() => setView('submissions')}>
          {view === 'submissions' && <span className="nav-indicator" />}<ClipboardCheck size={19} />提出物
        </button>
      </div>
    </div>
  );
}

try {
  const rootEl = document.getElementById('root');
  if (ReactDOM.createRoot) {
    ReactDOM.createRoot(rootEl).render(<JobHuntCommand />);
  } else {

} catch (err) {
  document.getElementById('root').innerHTML =

}
